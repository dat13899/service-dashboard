<style>
/* ── Status dots ── */
.sc-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;flex-shrink:0}
.sc-dot.running{background:var(--green,#22c55e);box-shadow:0 0 6px var(--green,#22c55e)}
.sc-dot.stopped{background:var(--text-dim,#6b7280)}
.sc-dot.error{background:var(--red,#ef4444);box-shadow:0 0 6px var(--red,#ef4444)}

/* ── Stats bar ── */
.dash-stats{display:flex;gap:.6rem;margin-bottom:.8rem;flex-wrap:wrap}
.dash-stat{background:var(--glass-bg);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:12px;padding:.5rem 1rem;flex:1;min-width:100px;text-align:center;box-shadow:0 4px 16px var(--glass-shadow);transition:.2s}
.dash-stat:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--glass-shadow)}
.dash-stat .stat-num{font-size:1.25rem;font-weight:700;line-height:1.3}
.dash-stat .stat-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.dash-stat.stat-green .stat-num{color:var(--green)}
.dash-stat.stat-gray .stat-num{color:var(--text-dim)}
.dash-stat.stat-red .stat-num{color:var(--red)}
.dash-stat.stat-blue .stat-num{color:var(--accent)}

/* ── Service cards ── */
.svc-card{background:var(--glass-bg);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:12px;padding:0;margin-bottom:.5rem;box-shadow:0 4px 16px var(--glass-shadow);transition:.2s;overflow:hidden}
.svc-card:hover{border-color:var(--accent);box-shadow:0 6px 24px var(--glass-shadow)}
.svc-card .svc-top{padding:.65rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.svc-card .svc-top:hover{background:var(--surface-2)}
.svc-card .svc-dot{flex-shrink:0}
.svc-card .svc-name{flex:1;font-size:.85rem;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc-card .svc-port{font-size:.65rem;padding:.15rem .5rem;border-radius:6px;background:var(--surface-2);border:1px solid var(--glass-border);color:var(--text-dim);flex-shrink:0;text-decoration:none}
.svc-card .svc-port:hover{border-color:var(--accent);color:var(--accent)}
.svc-card .svc-meta{font-size:.7rem;color:var(--text-dim);display:flex;gap:.3rem;align-items:center;flex-shrink:0}
.svc-card .svc-actions{display:flex;gap:2px;padding:.35rem .75rem;border-top:1px solid var(--glass-border);flex-wrap:wrap}
.svc-card .svc-actions button{background:none;border:none;color:var(--text-dim);font-size:.7rem;padding:.2rem .5rem;border-radius:6px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:3px}
.svc-card .svc-actions button:hover{background:var(--surface-2);color:var(--text)}
.svc-card .svc-actions button:disabled{opacity:.3;cursor:not-allowed}
.svc-card .svc-actions .act-start:hover{color:var(--green)}
.svc-card .svc-actions .act-stop:hover{color:var(--red)}
.svc-card .svc-actions .act-restart:hover{color:var(--accent)}
.svc-card .svc-actions .act-logs{color:var(--accent)}
.svc-card .svc-actions .act-del:hover{color:var(--red)}
.svc-card .svc-bar{height:3px;background:var(--border);overflow:hidden}
.svc-card .svc-bar .fill{height:100%;background:var(--green);transition:width 1s}
.svc-card .svc-desc{padding:0 .75rem .35rem;font-size:.7rem;color:var(--text-dim);line-height:1.4}
.svc-card .svc-details{display:none;padding:.4rem .75rem .6rem;border-top:1px solid var(--glass-border);font-size:.7rem;gap:.5rem;flex-wrap:wrap}
.svc-card.expanded .svc-details{display:flex}
.svc-card .svc-details span{color:var(--text-dim)}
.svc-card .svc-details strong{color:var(--text)}
.svc-card .svc-chart{height:18px;background:var(--surface-2);border-radius:3px;overflow:hidden;display:flex;gap:1px;padding:1px;margin:.3rem .75rem .5rem}
.svc-card .svc-chart .seg{flex:1;border-radius:1px;transition:background .5s}
.svc-card .svc-chart .seg.running{background:var(--green)}
.svc-card .svc-chart .seg.stopped{background:var(--border)}
.svc-card .svc-chart .seg.error{background:var(--red)}
.svc-card .auto-restart-badge{font-size:.6rem;padding:.1rem .4rem;border-radius:4px;background:rgba(245,158,11,.15);color:var(--amber);flex-shrink:0}

/* ── Log panel ── */
.log-panel{background:var(--glass-bg);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 16px var(--glass-shadow)}
.log-header{display:flex;align-items:center;gap:.4rem;padding:.5rem .75rem;border-bottom:1px solid var(--glass-border);flex-shrink:0}
.log-header .log-title{font-size:.8rem;font-weight:600;flex-shrink:0}
.log-header select{flex:1;background:var(--surface-2);border:1px solid var(--glass-border);border-radius:6px;color:var(--text);font-size:.7rem;padding:.2rem .4rem;outline:none;max-width:180px}
.log-header .log-actions{display:flex;gap:3px}
.log-header .log-actions button{background:none;border:1px solid transparent;border-radius:5px;color:var(--text-dim);padding:.2rem .45rem;font-size:.7rem;cursor:pointer;transition:.15s;line-height:1}
.log-header .log-actions button:hover{border-color:var(--glass-border);background:var(--surface-2)}
.log-header .log-status{font-size:.65rem;color:var(--text-dim);margin-left:auto}
#log-box{flex:1;padding:.5rem .75rem;font-family:monospace;font-size:.7rem;min-height:180px;max-height:calc(60vh - 100px);overflow-y:auto;white-space:pre-wrap;color:var(--text);line-height:1.6;background:transparent}
#log-box .log-line{padding:1px 0;transition:background .15s}
#log-box .log-line:hover{background:var(--surface-2);border-radius:2px}
#log-box .log-line.error{color:var(--red)}
#log-box .log-line.warn{color:var(--accent)}

/* ── Modals ── */
.modal-card{background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);color:var(--text)}
.modal-card-head,.modal-card-foot{background:var(--glass-bg);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-color:var(--glass-border)}
.modal-card-title{color:var(--text-strong)}
.modal-card-foot{border-top:1px solid var(--glass-border)}

/* ── Layout ── */
.dash-layout{display:flex;gap:1rem;min-height:0;height:calc(100vh - 100px)}
.dash-services{flex:1;min-width:0;overflow-y:auto;padding:0}
.dash-logs{width:clamp(280px,30vw,480px);flex-shrink:0;overflow-y:auto;padding:0}
@media(max-width:960px){.dash-layout{flex-direction:column;height:auto}.dash-logs{width:auto}}

/* ── Alerts ── */
.alert-badge{position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--red);color:#fff;border-radius:999px;padding:.25rem .6rem;font-size:.7rem;font-weight:700;cursor:pointer;display:none;animation:pulse-alert 1s infinite}
@keyframes pulse-alert{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.alert-dropdown{display:none;position:fixed;top:3rem;right:1rem;z-index:9999;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:12px;padding:.5rem;max-width:300px;max-height:200px;overflow-y:auto;box-shadow:0 4px 20px var(--glass-shadow);font-size:.75rem}
.alert-dropdown.show{display:block}
.alert-dropdown .alert-entry{padding:.3rem .5rem;border-bottom:1px solid var(--glass-border);cursor:pointer}
.alert-dropdown .alert-entry:hover{background:var(--surface-2)}
.alert-dropdown .alert-entry:last-child{border-bottom:none}

/* ── Resource table ── */
.resource-table{width:100%;font-size:.7rem;border-collapse:collapse}
.resource-table th,.resource-table td{text-align:left;padding:.2rem .4rem;border-bottom:1px solid var(--glass-border)}
.resource-table th{color:var(--text-dim);font-weight:600}
.resource-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:2px;min-width:40px}
.resource-bar .fill{height:100%;background:var(--accent);border-radius:2px}
.mem-bar{width:60px}

/* ── Tabs ── */
.tab-bar{display:flex;gap:.3rem;margin-bottom:.5rem;flex-wrap:wrap}
.tab-bar button{background:none;border:1px solid var(--glass-border);border-radius:8px;padding:.25rem .75rem;font-size:.75rem;cursor:pointer;color:var(--text-dim);transition:.15s;font-weight:500}
.tab-bar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-bar button:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.panel{display:none}
.panel.active{display:block}
.svc-search{margin-bottom:.4rem;width:100%;box-sizing:border-box;padding:.35rem .6rem;border:1px solid var(--glass-border);border-radius:8px;background:var(--glass-bg);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:var(--text);font-size:.75rem;outline:none;transition:border-color .15s}
.svc-search:focus{border-color:var(--accent)}
.tab-desc{font-size:.7rem;color:var(--text-dim);margin-bottom:.5rem}
.files-entry{padding:.25rem .5rem;font-size:.75rem;display:flex;gap:.5rem;align-items:center;cursor:pointer;border-radius:6px;transition:background .15s}
.files-entry:hover{background:var(--surface-2)}
.files-entry .icon{width:1.2rem;text-align:center}

/* ── Base utility classes ── */
.mt-1{margin-top:.25rem}
.mt-2{margin-top:4px}
.ml-1{margin-left:6px}
.m-0{margin:0}
.flex-1{flex:1}
.col-header{margin-bottom:.3rem;flex-wrap:wrap;gap:.4rem}
@media(max-width:768px){.col-header{display:flex!important;flex-direction:row!important;justify-content:flex-start!important;flex-wrap:wrap}}
</style>

<body>
<script src="/assets/theme.js?v=2"></script>
<div id="alert-badge" class="alert-badge" onclick="toggleAlerts()">!</div>
<div class="alert-dropdown" id="alert-dropdown"></div>

<main id="dash-main">
<!-- Stats bar -->
<div class="dash-stats">
  <div class="dash-stat stat-green"><div class="stat-num" id="stat-running">0</div><div class="stat-label">Running</div></div>
  <div class="dash-stat stat-gray"><div class="stat-num" id="stat-stopped">0</div><div class="stat-label">Stopped</div></div>
  <div class="dash-stat stat-red"><div class="stat-num" id="stat-error">0</div><div class="stat-label">Errors</div></div>
  <div class="dash-stat stat-blue"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
</div>

<div class="dash-layout">
  <div class="dash-services" id="dash-services">
    <div class="tab-bar">
      <button class="active" onclick="switchTab('svc')" data-tab="svc">Services</button>
      <button onclick="switchTab('res')" data-tab="res">⚡ Resources</button>
      <button onclick="switchTab('ports')" data-tab="ports">🔌 Ports</button>
      <button onclick="switchTab('files')" data-tab="files">📁 Files</button>
    </div>

    <div id="svc-skel" style="display:none">
      <div class="svc-card"><div class="svc-top"><div class="svc-name" style="height:1rem;width:60%;background:var(--border);border-radius:4px"></div></div></div>
      <div class="svc-card"><div class="svc-top"><div class="svc-name" style="height:1rem;width:50%;background:var(--border);border-radius:4px"></div></div></div>
      <div class="svc-card"><div class="svc-top"><div class="svc-name" style="height:1rem;width:70%;background:var(--border);border-radius:4px"></div></div></div>
    </div>

    <div id="tab-svc" class="panel active">
      <input class="svc-search" id="svc-search" placeholder="🔍 Filter services..." oninput="filterSvcs()">

        <button class="button is-small" onclick="bulkStart()">▶ Start All</button>
        <button class="button is-small" onclick="bulkStop()">■ Stop All</button>
        <button class="button is-small flex-1" style="border-style:dashed" onclick="openAddModal()">＋ Thêm service</button>

    </div>

        <span id="files-path">/</span>
        <button class="button is-small" onclick="filesUp()" id="files-up-btn" style="display:none">⬆</button>
        <button class="button is-small" onclick="filesRefresh()" style="margin-left:auto">↻</button>

      <div id="files-list"><span class="has-text-grey-light">Loading...</span></div>

  <!-- Log panel -->
  <div class="dash-logs" id="dash-logs">

        <span class="log-title">📋 Logs</span>

<!-- Add service modal -->
<div class="modal" id="add-modal">
  <div class="modal-background" onclick="closeAddModal()"></div>

      <div class="field"><label class="label">Description</label><div class="control"><input class="input" id="add-desc" placeholder="Optional"></div></div>
      <div class="field"><label class="label">Auto-restart every (seconds, 0=off)</label><div class="control"><input class="input" id="add-restart" placeholder="0" type="number" value="0"></div></div>

<!-- Edit service modal -->
<div class="modal" id="edit-modal">
  <div class="modal-background" onclick="closeEditModal()"></div>
  <div class="modal-card glass">
    <header class="modal-card-head"><p class="modal-card-title is-5">⚙️ Edit Service</p></header>
    <section class="modal-card-body">
      <div class="field"><label class="label">Auto-restart every (seconds)</label><div class="control"><input class="input" id="edit-restart" placeholder="0" type="number"></div></div>

<!-- Confirm modal -->
<div class="modal" id="confirm-modal">
  <div class="modal-background" onclick="closeConfirm()"></div>
  <div class="modal-card glass">
    <header class="modal-card-head"><p class="modal-card-title is-5">⚠️ Confirm</p></header>
    <section class="modal-card-body"><p id="confirm-msg">Are you sure?</p></section>
    <footer class="modal-card-foot">
      <button class="button" onclick="closeConfirm()">Cancel</button>
      <button class="button is-danger" id="confirm-btn" onclick="">Confirm</button>

<script>
function clearCacheAndSW(){
  if('caches' in window){caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).then(()=>{toast('🧹 Cache cleared','success')})}
  setTimeout(()=>location.reload(),500);
}
const $=id=>document.getElementById(id);
let confirmCb=null,autoScroll=true,logSvcId=null,sseRetries=0,alertBuffer=[],filesStack=[''];


function showConfirm(msg,onConfirm){
  $('confirm-msg').innerHTML=msg;$('confirm-btn').onclick=()=>{closeConfirm();if(onConfirm)onConfirm()};
  $('confirm-modal').classList.add('is-active');
}
function closeConfirm(){$('confirm-modal').classList.remove('is-active')}

// ── Alerts (crash notifications) ──
function addAlert(msg){
  alertBuffer.push(msg);if(alertBuffer.length>20)alertBuffer.shift();
  $('alert-badge').style.display='block';$('alert-badge').textContent=alertBuffer.length;
}
function toggleAlerts(){
  const dd=$('alert-dropdown');
  dd.innerHTML=alertBuffer.length?alertBuffer.map((m,i)=>`<div class="alert-entry" onclick="dismissAlert(${i})">${esc(m)}</div>`).join(''):'<div class="alert-entry has-text-grey">No alerts</div>';
  dd.classList.toggle('show');
}
function dismissAlert(i){alertBuffer.splice(i,1);if(!alertBuffer.length){$('alert-badge').style.display='none';$('alert-dropdown').classList.remove('show')}toggleAlerts()}

// ── SSE with alert support ──
let logEventSource=null;
function connectSSE(filterId){
  if(logEventSource)logEventSource.close();
  logSvcId=filterId||null;
  const url=logSvcId?`/api/logs/stream?serviceId=${logSvcId}`:'/api/logs/stream';
  logEventSource=new EventSource(url);
  logEventSource.addEventListener('log',function(e){
    try{const d=JSON.parse(e.data);if(!logSvcId||d.serviceId===logSvcId)appendLog(d.line,false);sseRetries=0}catch(_){}
  });
  logEventSource.addEventListener('alert',function(e){
    try{const d=JSON.parse(e.data);addAlert(d.msg||'Service crashed')}catch(_){}
  });
  logEventSource.onerror=function(){
    logEventSource.close();sseRetries++;
    if(sseRetries<5)setTimeout(()=>connectSSE(logSvcId),3000*Math.min(sseRetries,3));
    else $('log-status').textContent='⚠️ disconnected';
  };
}
function appendLog(line,prepend){
  const box=$('log-box');
  const cls=line.startsWith('[E]')||line.startsWith('[ERROR]')?'error':line.includes('warn')?'warn':'';
  const el=document.createElement('div');el.className='log-line'+(cls?' '+cls:'');
  el.textContent=line;
  if(prepend)box.prepend(el);else box.appendChild(el);
  if(autoScroll)box.scrollTop=box.scrollHeight;
}
function toggleAutoScroll(){autoScroll=!autoScroll;$('auto-scroll-btn').style.opacity=autoScroll?'1':'.4'}
function clearLogs(){$('log-box').innerHTML='';$('log-status').textContent=''}

// ── Health ping ──
async function pingHealth(id,port,el){
  if(!port){el.className='health-dot offline';return}
  try{
    const r=await fetch(`/api/services/${id}/health`,{signal:AbortSignal.timeout(4000)});
    const d=await r.json();el.className='health-dot '+(d.ok?'online':'offline')+(d.ok?' pulse':'');
  }catch(e){el.className='health-dot offline'}
}

// ── Tab switching ──
function switchTab(name){
  document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
  if(name==='res')loadResources();
  if(name==='ports')loadPorts();
  if(name==='files')loadFiles();
}

// ── Search filter ──
function filterSvcs(){
  const q=$('svc-search').value.toLowerCase();
  document.querySelectorAll('.svc-card').forEach(c=>{
    c.style.display=c.textContent.toLowerCase().includes(q)?'':'none';
  });
}

// ── Bulk ──
async function bulkStart(){
  $('svc-list').innerHTML='<div class="card glass-card"><div class="card-content has-text-centered has-text-grey-light"><small>Starting all...</small></div></div>';
  await fetch('/api/services/start-all',{method:'POST'});setTimeout(loadSvcs,800);
}
async function bulkStop(){
  showConfirm('Stop <strong>all running</strong> services?',async()=>{
    await fetch('/api/services/stop-all',{method:'POST'});setTimeout(loadSvcs,500);
  });
}

// ── Load services ──
async function loadSvcs(){
  $('svc-skel').style.display='block';
  $('svc-list').innerHTML='';
  try{const r=await fetch('/api/services');render(await r.json());$('svc-skel').style.display='none';const s=$('log-select');if(s.value&&!logSvcId)selLog(s.value)}catch(e){$('svc-skel').style.display='none'}
}
function render(svcs){
  const list=$('svc-list');
  if(!svcs||!svcs.length){list.innerHTML='<div class="svc-card"><div class="svc-top" style="justify-content:center;padding:2rem"><span class="has-text-grey-light"><small>Chưa có service nào. Bấm + để thêm.</small></span></div></div>';return}
  let run=0,stop=0,err=0;
  list.innerHTML=svcs.map((s,i)=>{
    if(s.status==='running')run++;else if(s.status==='error')err++;else stop++;
    const up=s.uptime>0?fmt(s.uptime):'',lnk=s.port>0?` href="/proxy/${s.port}/" target="_blank"`:'';
    const upPct=s.uptime>0?Math.min(100,Math.round(s.uptime/86400*100)):0;
    const arlbl=s.autoRestart?`<span class="auto-restart-badge" title="Auto-restart every ${fmt(s.autoRestart)}">↻ ${fmt(s.autoRestart)}</span>`:'';
    const desc=s.description?`<div class="svc-desc">${esc(s.description)}</div>`:'';
    const meta=s.pid||up?`<div class="svc-meta">${s.pid?'PID '+s.pid+' ':''}${up?'⏱ '+up:''}</div>`:'';
    return `<div class="svc-card${s.status==='error'?' svc-error':''}" data-svc-id="${s.id}">
      <div class="svc-top" onclick="toggleExpand('${s.id}')">
        <span class="sc-dot ${s.status} svc-dot"></span>
        <span class="svc-name">${esc(s.name||s.id)}</span>
        ${arlbl}
        ${s.port>0?`<a class="svc-port"${lnk}>:${s.port}</a>`:''}
        ${meta}
      </div>
      ${desc}
      ${s.uptime>0?`<div class="svc-bar"><div class="fill" style="width:${upPct}%"></div></div>`:''}
      <div class="svc-actions">
        <button class="act-start" onclick="act('${s.id}','start')" ${s.status==='running'?'disabled':''}>▶ Start</button>
        <button class="act-stop" onclick="act('${s.id}','stop')" ${s.status!=='running'?'disabled':''}>■ Stop</button>
        <button class="act-restart" onclick="act('${s.id}','restart')" ${s.status!=='running'?'disabled':''}>↻ Restart</button>
        <button class="act-logs" onclick="selLog('${s.id}')">📋 Logs</button>
        <button class="act-del" onclick="deleteSvc('${s.id}')" style="margin-left:auto">🗑</button>
      </div>
      <div class="svc-details" id="exp-${s.id}">
        <span>Status: <strong>${s.status}</strong></span>
        ${s.port?`<span>Port: <strong>${s.port}</strong></span>`:''}
        ${s.pid?`<span>PID: <strong>${s.pid}</strong></span>`:''}
        ${s.uptime>0?`<span>Uptime: <strong>${fmt(s.uptime)}</strong></span>`:''}
        ${s.port?`<span><a href="/proxy/${s.port}/" target="_blank" rel="noopener">🔗 Open</a></span>`:''}
        <span style="margin-left:auto"><button class="button is-small" style="font-size:.65rem;padding:.1rem .5rem" onclick="editSvc('${s.id}')">⚙️</button></span>
      </div>
      <div class="svc-chart" id="chart-${s.id}"><span class="has-text-grey-light is-size-7" style="padding:0 .3rem">${s.status==='running'?'':''}</span></div>
    </div>`;
  }).join('');
  $('stat-running').textContent=run;
  $('stat-stopped').textContent=stop;
  $('stat-error').textContent=err;
  $('stat-total').textContent=svcs.length;
  svcs.forEach(s=>{if(s.port)setTimeout(()=>pingHealth(s.id,s.port,null),svcs.indexOf(s)*300)});
  setTimeout(()=>svcs.forEach(s=>loadChart(s.id)),500);
}
async function loadChart(id){
  const el=$('chart-'+id);if(!el)return;
  try{const r=await fetch(`/api/services/${id}/timeline`);const d=await r.json();const ev=d.events||[];
    if(!ev.length){el.innerHTML='<span class="has-text-grey-light is-size-7">No data</span>';return}
    const recent=ev.slice(-72);el.innerHTML=recent.map(e=>`<div class="seg ${e.status==='running'?'running':e.status==='error'?'error':'stopped'}" title="${new Date(e.ts).toLocaleTimeString('vi-VN')+': '+e.msg}"></div>`).join('');
  }catch(e){el.innerHTML='<span class="has-text-grey-light is-size-7">—</span>'}
}
function toggleExpand(id){document.querySelector(`[data-svc-id="${id}"]`)?.classList.toggle('expanded')}
async function deleteSvc(id){
  showConfirm(`🗑 Delete service <strong>${esc(id)}</strong>?`,async()=>{
    const r=await fetch('/api/services/'+id,{method:'DELETE'});const d=await r.json();
    if(d.error)return toast('❌ Delete failed','error');
    toast('🗑 Deleted','info');loadSvcs();
  });
}
async function act(id,a){
  if(a==='stop'||a==='restart'){
    showConfirm(`⚠️ ${a==='stop'?'Stop':'Restart'} <strong>${esc(id)}</strong>?`,async()=>{
      const r=await fetch(`/api/services/${id}/${a}`,{method:'POST'});const d=await r.json();
      if(d.error)return toast('❌ '+d.error,'error');
      toast(a==='stop'?'⏹ Stopped':'↻ Restarted','info');loadSvcs();
    });return;
  }
  const r=await fetch(`/api/services/${id}/${a}`,{method:'POST'});const d=await r.json();
  if(d.error)return toast('❌ '+d.error,'error');
  toast('▶ Started','success');loadSvcs();
}
function editSvc(id){$('edit-id').value=id;$('edit-restart').value=0;$('edit-modal').classList.add('is-active')}
async function saveEdit(){
  const id=$('edit-id').value,restart=$('edit-restart').value;
  await fetch('/api/services/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({autoRestart:parseInt(restart)||0})});
  toast('💾 Saved','success');closeEditModal();loadSvcs();
}
function closeEditModal(){$('edit-modal').classList.remove('is-active')}
function openAddModal(){$('add-modal').classList.add('is-active')}
function closeAddModal(){$('add-modal').classList.remove('is-active')}
async function addService(){
  const name=$('add-name').value.trim();if(!name)return;
  $('add-btn').disabled=true;$('add-btn').innerHTML='<span class="spinner"></span>';
  const body={name,command:$('add-cmd').value.trim(),dir:$('add-wd').value.trim(),port:parseInt($('add-port').value)||0,description:$('add-desc').value.trim(),autoRestart:parseInt($('add-restart').value)||0};
  try{const r=await fetch('/api/services',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(d.error)return toast('❌ '+d.error,'error');toast('➕ Added','success');closeAddModal();loadSvcs()}catch(e){toast('❌ Failed','error')}
  finally{$('add-btn').disabled=false;$('add-btn').innerHTML='➕ Add'}
}
function selLog(id){$('log-select').value=id;connectSSE(id);fetchLog(id)}
async function fetchLog(id){
  try{const r=await fetch(`/api/services/${id}/logs?lines=100`);const d=await r.json();$('log-box').innerHTML='';for(const l of(d.logs||[]))appendLog(l.line||'',false)}catch(e){}
}

// ── Resources tab ──
async function loadResources(){
  const el=$('res-list');
  try{const r=await fetch('/api/system/resources');const d=await r.json();
    if(!d||!d.length){el.innerHTML='<span class="has-text-grey-light">No resources found</span>';return}
    el.innerHTML=`<table class="resource-table"><tr><th>Service</th><th>PID</th><th>Process</th><th>Memory</th></tr>${d.map(entry=>`<tr><td>${esc(entry.id)}</td><td><code>${entry.pid}</code></td><td>${esc(entry.name)}</td><td><div style="display:flex;align-items:center;gap:4px"><div class="resource-bar mem-bar"><div class="fill" style="width:${Math.min(100,entry.memMB/10)}%"></div></div>${entry.memMB} MB</div></td></tr>`).join('')}</table>`;
  }catch(e){el.innerHTML='<span class="has-text-danger">Failed to load</span>'}
}

// ── Ports tab ──
async function loadPorts(){
  const el=$('ports-list');
  try{const r=await fetch('/api/scan');const d=await r.json();
    if(!d||!d.length){el.innerHTML='<span class="has-text-grey-light">No unknown ports</span>';return}
    el.innerHTML=`<table class="resource-table"><tr><th>Port</th><th>PID</th><th>Process</th></tr>${d.map(p=>`<tr><td><code>${p.port}</code></td><td><code>${p.pid}</code></td><td>${esc(p.name||'—')}</td></tr>`).join('')}</table>`;
  }catch(e){el.innerHTML='<span class="has-text-danger">Failed to load</span>'}
}

// ── Files tab ──
async function loadFiles(sub){
  const el=$('files-list');let fp=sub||filesStack[filesStack.length-1];
  $('files-path').textContent='/'+fp;$('files-up-btn').style.display=fp?'':'none';
  try{const r=await fetch('/api/files?path='+encodeURIComponent(fp));const d=await r.json();
    if(d.error){el.innerHTML='<span class="has-text-danger">Error listing files</span>';return}
    el.innerHTML=(d.entries||[]).map(e=>`<div class="files-entry" ${e.isDir?`onclick="filesEnter('${esc(e.name)}')"`:`onclick="filesInfo('${esc(e.name)}','${esc(fp)}')"`}><span class="icon">${e.isDir?'📁':'📄'}</span><span>${esc(e.name)}</span><span class="has-text-grey" style="margin-left:auto;font-size:.65rem">${e.isDir?'':formatSize(e.size)}</span></div>`).join('')||'<span class="has-text-grey-light">Empty</span>';
  }catch(e){el.innerHTML='<span class="has-text-danger">Failed</span>'}
}
function filesEnter(name){filesStack.push((filesStack[filesStack.length-1]?filesStack[filesStack.length-1]+'/':'')+name);loadFiles()}
function filesUp(){if(filesStack.length>1)filesStack.pop();loadFiles()}
function filesRefresh(){loadFiles()}
function filesInfo(name,fp){toast(`📄 ${name}`,'info')}
function formatSize(s){if(s<1024)return s+'B';if(s<1048576)return (s/1024).toFixed(1)+'KB';return (s/1048576).toFixed(1)+'MB'}

// ── Init ──
(async function init(){
  try{
    const r=await fetch('/api/services');const svcs=await r.json();
    const sel=$('log-select');
    sel.innerHTML='<option value="">— All —</option>'+svcs.map(s=>`<option value="${s.id}">${esc(s.name||s.id)}</option>`).join('');
    sel.onchange=()=>{const v=sel.value;if(v)selLog(v);else connectSSE(null)};
    if(svcs.length)selLog(svcs[0].id);
  }catch(e){}
})();
setInterval(loadSvcs,5000);loadSvcs();
setInterval(loadResources,15000);
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return(h?h+'h ':'')+(m?m+'m ':'')+sec+'s'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
