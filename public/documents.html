@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.toast.success{background:var(--green,#22c55e)}

.toast .toast-undo{background:rgba(255,255,255,.2);border:none;color:#fff;padding:2px 8px;border-radius:4px;font-size:.75rem;cursor:pointer;margin-left:.5rem;font-weight:600}

@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

.kb-hint{position:fixed;bottom:1rem;right:1rem;z-index:9997;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:10px;padding:.6rem .9rem;font-size:.75rem;box-shadow:0 8px 32px var(--glass-shadow);display:none;min-width:200px}

<div class="blob-container"><div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div id="nav-target" data-active="docs" data-bc=" / documents"></div>
<script>
fetch('/navbar.html').then(r=>r.text()).then(t=>{
  const el=document.getElementById('nav-target'),a=el.dataset.active,bc=el.dataset.bc?' <span class="has-text-grey-light" style="font-weight:400;margin-left:4px">'+el.dataset.bc+'</span>':'';
  const i=localStorage.getItem('btdat-theme')==='light'?'🌙':'☀️';
  el.outerHTML=t.replace(/{BREADCRUMB}/g,bc).replace(/{THEME_ICON}/g,i).replace(/{HOME}/g,a==='home'?' has-text-link':'').replace(/{DASH}/g,a==='dashboard'?' has-text-link':'').replace(/{DOCS}/g,a==='docs'?' has-text-link':'').replace(/{UTIL}/g,a==='utilities'?' has-text-link':'').replace(/{WIDGET}/g,a==='widget'?' has-text-link':'');
  const n=document.querySelector('.navbar.is-glass');if(n){const o=()=>n.classList.toggle('scrolled',window.scrollY>20);window.addEventListener('scroll',o,{passive:true});o()}
});
</script>
<div class="navbar-spacer"></div>
<nav class="doc-toolbar" aria-label="Document tools">
  <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="font-controls">
    <button onclick="fontSize(-1)" title="Smaller">A−</button>
    <button onclick="fontSize(1)" title="Larger">A+</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" onclick="openNew()"><i class="fas fa-plus"></i>&ensp;New</button>
  <button class="btn green" onclick="openUpload()"><i class="fas fa-upload"></i>&ensp;Upload</button>
  <input type="file" id="upload-input" accept=".docx" style="display:none" onchange="uploadFile(this)">
</nav>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="search-wrap">
      <input id="search-input" placeholder="🔍 Search..." oninput="onSearchInput()" onfocus="showSearchHistory()">
      <div class="search-history" id="search-history"></div>
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="sort-bar">
      <span>Sort:</span>
      <select id="sort-select" onchange="renderList()">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="name-asc">A→Z</option>
        <option value="name-desc">Z→A</option>
      </select>
      <span style="flex:1"></span>
      <label style="display:flex;align-items:center;gap:2px;cursor:pointer">
        <input type="checkbox" id="status-filter" onchange="renderList()"> Draft
      </label>
    </div>
    <div class="tag-filter" id="tag-filter"></div>
    <ul class="doc-list" id="doc-list"></ul>
    <div class="sidebar-footer">
      <span><span id="doc-count">0</span> <span id="doc-count-detail" class="has-text-grey"></span></span>
    <a href="#" onclick="clearCacheAndSW();return false" style="color:var(--text-dim);font-size:.6rem" title="Xoá SW cache + unregister">🧹 clear cache</a>
      <button class="bulk-del" id="bulk-del-btn" onclick="bulkDelete()"><i class="fas fa-trash"></i> Delete selected</button>
    </div>
  </div>
  <div class="reader" id="reader">
    <div class="empty" id="empty-state">
      <div class="icon">📄</div>
      <p>Chọn tài liệu để đọc</p>
    </div>
    <div id="doc-view" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
      <div class="reader-header">
        <button id="back-btn" style="display:none;background:none;border:1px solid var(--glass-border);border-radius:5px;color:var(--text-dim);padding:.2rem .5rem;font-size:.8rem;cursor:pointer" onclick="showList()"><i class="fas fa-arrow-left"></i></button>
        <span class="title" id="doc-title" ondblclick="renameStart()" title="Double-click to rename"></span>
        <input class="title-input" id="doc-title-input" style="display:none" onkeydown="if(event.key==='Enter')renameSave();if(event.key==='Escape')renameCancel()" onblur="renameSave()">
        <span class="meta" id="doc-meta"></span>
        <div class="toc-btn">
          <button onclick="toggleToc()" title="Table of Contents"><i class="fas fa-list"></i></button>
          <div class="toc-drop" id="toc-drop"></div>
        </div>
        <div class="actions">
          <button onclick="onPrint()" title="Print"><i class="fas fa-print"></i></button>
          <button onclick="onDownload()" title="Download"><i class="fas fa-download"></i></button>
          <button id="btn-edit" onclick="openEditor()" title="Edit"><i class="fas fa-pen"></i></button>
          <button onclick="exportPdf()" title="Export PDF" id="btn-export-pdf"><i class="fas fa-file-pdf"></i></button>
        </div>
      </div>
      <div class="reader-content" id="reader-content" tabindex="0" onscroll="onReaderScroll()" ondragover="onDragOver(event)" ondrop="onDrop(event)">
      </div>
    </div>
  </div>
</div>

<script>
// Auto-fetch + render documents
const DB_NAME='btdat-docs';

function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('docs',{keyPath:'id'});e.target.result.createObjectStore('meta',{keyPath:'k'})};
  r.onsuccess=e=>res(e.target.result);
  r.onerror=e=>rej(e.target.error);
})}

let DB=null, DOCS=[], TAGS=new Set(), ACTIVE=null, EDITING=false, BULK=false, FONT_SIZE=0, LAST_DOCS=[];

async function init(){
  DB=await openDB();
  await loadMeta();
  await loadDocs();
  renderList();
  renderTagFilter();
  applyFontSize();
}
function toast(msg,type='info',undo=null){
  const c=document.querySelector('.toast-container')||(()=>{const d=document.createElement('div');d.className='toast-container';document.body.appendChild(d);return d})();
  const t=document.createElement('div');t.className='toast '+type;t.innerHTML=msg;
  if(undo){const u=document.createElement('button');u.className='toast-undo';u.textContent='Undo';u.onclick=()=>{undo();t.classList.add('removing');setTimeout(()=>t.remove(),200)};t.appendChild(u)}
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),200)},undo?8e3:3e3);
}

async function loadMeta(){
  if(!DB)return;
  const r=await DB.transaction('meta','readonly').objectStore('meta').get('fontSize');
  if(r)FONT_SIZE=r.v;
}
async function saveMeta(k,v){
  if(!DB)return;
  await DB.transaction('meta','readwrite').objectStore('meta').put({k,v});
}

async function loadDocs(){
  if(!DB)return;
  DOCS=await new Promise((res,rej)=>{
    const r=DB.transaction('docs').objectStore('docs').getAll();
    r.onsuccess=e=>res(e.target.result||[]);
    r.onerror=e=>rej(e.error);
  });
  TAGS=new Set();
  DOCS.forEach(d=>(d.tags||[]).forEach(t=>TAGS.add(t)));
}
async function saveDoc(doc){
  await DB.transaction('docs','readwrite').objectStore('docs').put(doc);
}
async function deleteDoc(id){
  await DB.transaction('docs','readwrite').objectStore('docs').delete(id);
}

function renderList(){
  const list=document.getElementById('doc-list'),filter=document.getElementById('status-filter'),sort=document.getElementById('sort-select'),sel=document.getElementById('tag-filter').querySelector('.tag-chip.active');
  let items=[...DOCS];
  if(filter.checked)items=items.filter(d=>d.status==='draft');
  const tag=sel?sel.dataset.tag:null;
  if(tag&&tag!=='all')items=items.filter(d=>(d.tags||[]).includes(tag));
  const v=sort.value;
  if(v==='newest')items.sort((a,b)=>new Date(b.created)-new Date(a.created));
  else if(v==='oldest')items.sort((a,b)=>new Date(a.created)-new Date(b.created));
  else if(v==='name-asc')items.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  else if(v==='name-desc')items.sort((a,b)=>(b.title||'').localeCompare(a.title||''));
  list.innerHTML=items.map(d=>{
    const active=ACTIVE===d.id?' active':'',cb=BULK?`<input type="checkbox" class="d-cb show" data-id="${d.id}" onchange="updateBulkBtn()">`:'<input type="checkbox" class="d-cb" data-id="${d.id}" onchange="updateBulkBtn()">';
    const tags=(d.tags||[]).map(t=>`<span class="d-tag">${escHtml(t)}</span>`).join('');
    return `<li class="doc-item${active}" onclick="selectDoc('${d.id}')" ondblclick="openEditor()">
      ${cb}
      <div style="flex:1;min-width:0">
        <div class="d-title">${escHtml(d.title||'Untitled')}</div>
        <div class="d-meta">${new Date(d.created).toLocaleDateString('vi-VN')} · ${d.status||'draft'}${tags?' · ':''}${tags}</div>
      </div>
    </li>`
  }).join('');
  document.getElementById('doc-count').textContent=items.length;
  document.getElementById('doc-count-detail').textContent=DOCS.length!==items.length?`/ ${DOCS.length}`:'';
}

function renderTagFilter(){
  const el=document.getElementById('tag-filter');
  let h='<span class="tag-chip active" data-tag="all" onclick="filterTag(this)">All</span>';
  [...TAGS].sort().forEach(t=>{h+=`<span class="tag-chip" data-tag="${escHtml(t)}" onclick="filterTag(this)">${escHtml(t)}</span>`});
  el.innerHTML=h;
}

function filterTag(el){
  document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function selectDoc(id){
  ACTIVE=id;
  renderList();
  const doc=DOCS.find(d=>d.id===id);
  if(!doc)return;
  const empty=document.getElementById('empty-state'),view=document.getElementById('doc-view');
  empty.style.display='none';view.style.display='flex';
  document.getElementById('doc-title').textContent=doc.title||'Untitled';
  document.getElementById('doc-meta').textContent=new Date(doc.created).toLocaleDateString('vi-VN')+' · '+(doc.status||'draft');
  const content=document.getElementById('reader-content');
  content.innerHTML=marked.parse(doc.content||'');
  content.scrollTop=0;
  document.getElementById('back-btn').style.display=window.innerWidth<=768?'inline-block':'none';
  const cb=document.getElementById('btn-edit');if(cb)cb.disabled=false;
  const pb=document.getElementById('btn-export-pdf');if(pb)pb.disabled=false;
  LAST_DOCS.push(id);
  if(LAST_DOCS.length>100)LAST_DOCS.shift();
}

function showList(){
  ACTIVE=null;
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('doc-view').style.display='none';
  renderList();
}

function openNew(){
  const title=prompt('Document name:')||'Untitled';
  const doc={id:'doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),title,content:'# '+title+'\n\nStart writing...',created:new Date().toISOString(),status:'draft',tags:[]};
  DOCS.push(doc);
  saveDoc(doc);
  renderList();renderTagFilter();
  selectDoc(doc.id);
  openEditor();
}

function openUpload(){document.getElementById('upload-input').click()}

async function uploadFile(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text();
  const name=file.name.replace(/\.(docx|md|txt)$/i,'')||'Imported';
  const doc={id:'doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),title:name,content:text,created:new Date().toISOString(),status:'draft',tags:[]};
  DOCS.push(doc);
  saveDoc(doc);
  renderList();renderTagFilter();
  selectDoc(doc.id);
  input.value='';
  toast('Imported: '+name,'success');
}

function openEditor(){
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc)return;
  EDITING=true;
  const overlay=document.getElementById('editor-overlay')||(()=>{
    const d=document.createElement('div');d.className='editor-overlay';d.id='editor-overlay';
    d.innerHTML='<div class="editor-box"><div class="editor-header"><span class="title"></span><div class="actions"><button onclick="editorSave()" class="primary">💾 Save</button><button onclick="editorCancel()">Cancel</button></div></div><div class="editor-body"><textarea spellcheck="false"></textarea></div></div>';
    document.body.appendChild(d);
    d.addEventListener('click',e=>{if(e.target===d)editorCancel()});
    return d;
  })();
  overlay.classList.add('show');
  overlay.querySelector('.title').textContent='✏️ '+doc.title;
  overlay.querySelector('textarea').value=doc.content||'';
  overlay.querySelector('textarea').focus();
  document.addEventListener('keydown',editorKeydown);
}
function editorSave(){
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc)return;
  const ta=document.getElementById('editor-overlay').querySelector('textarea');
  doc.content=ta.value;
  saveDoc(doc);
  const content=document.getElementById('reader-content');
  content.innerHTML=marked.parse(doc.content||'');
  toast('Saved','success');
  editorCancel();
}
function editorCancel(){
  EDITING=false;
  const overlay=document.getElementById('editor-overlay');
  if(overlay)overlay.classList.remove('show');
  document.removeEventListener('keydown',editorKeydown);
}
function editorKeydown(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();editorSave()}
  if(e.key==='Escape')editorCancel();
}

function renameStart(){
  if(EDITING)return;
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc)return;
  const span=document.getElementById('doc-title'),input=document.getElementById('doc-title-input');
  input.value=doc.title||'';span.style.display='none';input.style.display='inline-block';input.focus();input.select();
}
function renameSave(){
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc)return;
  const span=document.getElementById('doc-title'),input=document.getElementById('doc-title-input');
  const v=input.value.trim()||'Untitled';doc.title=v;saveDoc(doc);
  span.textContent=v;span.style.display='inline';input.style.display='none';renderList();
}
function renameCancel(){
  document.getElementById('doc-title').style.display='inline';document.getElementById('doc-title-input').style.display='none';
}

function onSearchInput(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const res=document.getElementById('search-results');
  if(!q){res.classList.remove('show');renderList();return}
  const items=DOCS.filter(d=>(d.title||'').toLowerCase().includes(q)||(d.content||'').toLowerCase().includes(q)).slice(0,10);
  res.innerHTML=items.map(d=>`<div class="sr-item" onclick="selectDoc('${d.id}')">${escHtml(d.title)}<div class="sr-match">${escHtml(d.content?.slice(0,80))||''}</div></div>`).join('');
  res.classList.add('show');
}
function showSearchHistory(){
  if(document.getElementById('search-input').value.trim())return;
  const h=document.getElementById('search-history');
  if(LAST_DOCS.length){
    const items=LAST_DOCS.slice(-10).reverse().map(id=>DOCS.find(d=>d.id===id)).filter(Boolean);
    h.innerHTML=items.map(d=>`<div class="sh-item" onclick="selectDoc('${d.id}')">${escHtml(d.title)}</div>`).join('');
    h.classList.add('show');
  }
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')){document.querySelectorAll('.search-history,.search-results').forEach(el=>el.classList.remove('show'))}
});

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  s.classList.toggle('collapsed');
}

function toggleToc(){
  const d=document.getElementById('toc-drop');
  d.classList.toggle('show');
  if(d.classList.contains('show')){
    const headers=[];
    document.querySelectorAll('.reader-content h1,.reader-content h2,.reader-content h3').forEach(h=>{
      const level=parseInt(h.tagName[1]);
      if(!h.id)h.id='toc-'+Math.random().toString(36).slice(2,6);
      headers.push({level,id:h.id,text:h.textContent});
    });
    d.innerHTML=headers.map(h=>`<div class="toc-item toc-h${h.level}" onclick="scrollToToc('${h.id}')">${escHtml(h.text)}</div>`).join('');
  }
}
function scrollToToc(id){
  const el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth'});document.getElementById('toc-drop').classList.remove('show')}
}

function fontSize(delta){
  FONT_SIZE=Math.max(-4,Math.min(6,FONT_SIZE+(delta||0)));
  saveMeta('fontSize',FONT_SIZE);
  applyFontSize();
}
function applyFontSize(){
  const sizes=[.82,.88,.92,.95,.98,1.02,1.06,1.1,1.14,1.18,1.22];
  const idx=Math.max(0,Math.min(sizes.length-1,FONT_SIZE+4));
  document.documentElement.style.setProperty('--font-size',sizes[idx]+'rem');
}

function onPrint(){window.print()}
function onDownload(){
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc)return;
  const blob=new Blob([doc.content||''],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(doc.title||'untitled')+'.md';a.click();URL.revokeObjectURL(a.href);
}
async function exportPdf(){
  const pb=document.getElementById('btn-export-pdf');if(pb)pb.disabled=true;
  const doc=DOCS.find(d=>d.id===ACTIVE);if(!doc){pb.disabled=false;return}
  try{
    const w=window.open('','_blank');
    if(!w){toast('Popup blocked. Allow popups for PDF export.','error');pb.disabled=false;return}
    const style=document.querySelector('style').innerHTML;
    const global=await fetch('/assets/global.css').then(r=>r.text());
    w.document.write(`<!DOCTYPE html><html><head><title>${escHtml(doc.title)}</title><style>body{font-family:'Inter',sans-serif;padding:2rem;max-width:800px;margin:0 auto;color:#1e293b;line-height:1.7}${style}${global}body{background:#fff!important}</style></head><body>${marked.parse(doc.content||'')}</body></html>`);
    w.document.close();
    setTimeout(()=>{w.print();pb.disabled=false},500);
  }catch(e){toast('Export error','error');pb.disabled=false}
}

function clearCacheAndSW(){
  if(!confirm('Clear all IndexedDB docs + unregister ServiceWorker?'))return;
  indexedDB.deleteDatabase(DB_NAME);
  if('caches' in window){caches.keys().then(ns=>ns.forEach(n=>caches.delete(n)))}
  if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(r=>r.unregister()))}
  localStorage.clear();
  location.reload();
}

function onReaderScroll(){
  const el=document.getElementById('reader-content');
  if(!el)return;
  const p=el.scrollTop/(el.scrollHeight-el.clientHeight);
  document.querySelector('.reading-progress').style.width=(p*100)+'%';
}

function toggleBulkMode(){
  BULK=!BULK;document.getElementById('bulk-del-btn').classList.toggle('show',BULK);
  document.querySelectorAll('.d-cb').forEach(c=>c.classList.toggle('show',BULK));
  if(!BULK)document.querySelectorAll('.d-cb').forEach(c=>c.checked=false);
  updateBulkBtn();
}
function updateBulkBtn(){
  const n=document.querySelectorAll('.d-cb:checked').length;
  document.getElementById('bulk-del-btn').innerHTML='<i class="fas fa-trash"></i> Delete ('+n+')';
}
function bulkDelete(){
  const ids=[...document.querySelectorAll('.d-cb:checked')].map(c=>c.dataset.id);
  if(!ids.length)return;
  if(!confirm('Delete '+ids.length+' document(s)?'))return;
  ids.forEach(id=>{DOCS=DOCS.filter(d=>d.id!==id);deleteDoc(id)});
  if(ACTIVE&&ids.includes(ACTIVE))showList();
  BULK=false;
  renderList();
  toast('Deleted '+ids.length+' document(s)','info');
}

function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='copy'}
function onDrop(e){
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file&&file.name.match(/\.(md|txt|docx)$/i)){document.getElementById('upload-input').files=e.dataTransfer.files;uploadFile(document.getElementById('upload-input'))}
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toggleSplash(){/*noop*/}
// keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.getAttribute('contenteditable'))return;
  if(e.key==='/'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();document.getElementById('search-input').focus()}
  if(e.key==='n'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();openNew()}
  if(e.key==='Escape'){document.getElementById('toc-drop')?.classList.remove('show');if(EDITING)editorCancel()}
  if(e.key==='b'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();toggleBulkMode()}
});
init();
</script>

</body>
</html>
