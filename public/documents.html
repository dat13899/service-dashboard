.editor-overlay{position:fixed;inset:0;z-index:500;background:rgba(10,14,23,.88);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);display:none;flex-direction:column;animation:fadeIn .2s ease}

.auto-save{font-size:.55rem;color:var(--text-dim);transition:color .3s}
.auto-save.saving{color:var(--amber)}.auto-save.saved{color:var(--green)}
/* utility classes */
.doc-icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:0;transition:color .1s}
.doc-icon-btn:hover{color:var(--text)}
.doc-icon-sm{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:5px;color:var(--text-dim);padding:.2rem .45rem;font-size:.75rem;cursor:pointer;transition:all .12s}
.doc-icon-sm:hover{background:var(--surface-2);color:var(--text);border-color:var(--accent)}
.editor-input{background:var(--surface-2);border:1px solid var(--glass-border);border-radius:5px;color:var(--text);padding:.25rem .5rem;font-size:.72rem;outline:none}
.editor-input:focus{border-color:var(--accent)}
.editor-btn-accent{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:.25rem .6rem;font-size:.78rem;cursor:pointer;font-weight:600;transition:opacity .15s,transform .15s}

.editor-btn-ghost{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text-dim);padding:.25rem .6rem;font-size:.78rem;cursor:pointer;transition:all .12s}

.mono-textarea{min-height:160px;font-family:monospace;font-size:.82rem}

.doc-list::-webkit-scrollbar,.reader-content::-webkit-scrollbar,.toc-drop::-webkit-scrollbar{width:4px;height:4px}

.reading-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),#818cf8);z-index:999;width:0;transition:none;border-radius:0 2px 2px 0}

.drop-zone{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--accent);background:rgba(99,102,241,.08);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:3px dashed var(--accent);margin:1rem;border-radius:var(--radius-lg);pointer-events:none;animation:fadeIn .15s ease}

.modal-card{border-radius:var(--radius-lg);background:var(--glass-bg);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid var(--glass-border);box-shadow:0 16px 48px rgba(0,0,0,.2)}
.modal-card-head{border-bottom:1px solid var(--glass-border);background:transparent;border-radius:var(--radius-lg) var(--radius-lg) 0 0}

.modal .button:hover{background:var(--surface-2);color:var(--text);border-color:var(--accent)}
.modal .button.is-link{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal .button.is-link:hover{opacity:.9}
.modal .button.is-danger{background:var(--red);color:#fff;border-color:var(--red)}

@media(max-width:720px){

  .sidebar{width:100%}

}
@media print{
  .top-bar,.sidebar,.reader-header,.toast-container,.reading-progress,.font-controls{display:none!important}

  .reader-content{overflow:visible!important;padding:0!important}
}

<script src="/assets/theme.js?v=2"></script>
<div class="blob-container"><div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div id="nav-target" data-active="docs" data-bc=" / documents"></div>
<script>initNavbar()</script>
<div class="navbar-spacer"></div>
<nav class="doc-toolbar" aria-label="Document tools">
  <button id="toggle-sidebar" onclick="toggleSidebar()" class="doc-icon-btn" style="font-size:.9rem" title="Toggle sidebar">☰</button>
  <div class="font-controls">
    <button onclick="fontSize(-1)" title="Smaller">A−</button>
    <button onclick="fontSize(1)" title="Larger">A+</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" onclick="openNew()"><i class="fas fa-plus"></i>&ensp;New</button>
  <button class="btn" style="background:var(--green)" onclick="openUpload()"><i class="fas fa-upload"></i>&ensp;Upload</button>

</nav>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="search-wrap">
      <input id="search-input" placeholder="🔍 Search..." oninput="onSearchInput()" onfocus="showSearchHistory()">

      <div class="search-results" id="search-results"></div>
    </div>
    <div class="sort-bar">
      <span>Sort:</span>
      <select id="sort-select" onchange="renderList()">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="name-asc">A→Z</option>
        <option value="name-desc">Z→A</option>
      </select>
      <span style="flex:1"></span>
      <label class="flex ai-center" style="gap:2px;cursor:pointer">
        <input type="checkbox" id="status-filter" onchange="renderList()"> Draft
      </label>
    </div>
    <div class="tag-filter" id="tag-filter"></div>
    <ul class="doc-list" id="doc-list"></ul>
    <div class="sidebar-footer">
      <span><span id="doc-count">0</span> <span id="doc-count-detail" class="has-text-grey"></span></span>
    <a href="#" onclick="clearCacheAndSW();return false" class="doc-icon-btn" style="font-size:.6rem" title="Xoá SW cache + unregister">🧹 clear cache</a>
      <button class="bulk-del" id="bulk-del-btn" onclick="bulkDelete()"><i class="fas fa-trash"></i> Delete selected</button>
    </div>
  </div>
  <div class="reader" id="reader">
    <div class="empty" id="empty-state">
      <div class="icon">📄</div>
      <p>Chọn tài liệu để đọc</p>
    </div>
    <div id="doc-view" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
      <div class="reader-header">
        <button id="back-btn" class="doc-icon-sm" style="display:none" onclick="showList()"><i class="fas fa-arrow-left"></i></button>
        <span class="title" id="doc-title" ondblclick="renameStart()" title="Double-click to rename"></span>
        <input class="title-input" id="doc-title-input" style="display:none" onkeydown="if(event.key==='Enter')renameSave();if(event.key==='Escape')renameCancel()" onblur="renameSave()">
        <span class="meta" id="doc-meta"></span>
        <div class="toc-btn">
          <button onclick="toggleToc()" title="Table of Contents"><i class="fas fa-list"></i></button>
          <div class="toc-drop" id="toc-drop"></div>
        </div>
        <div class="actions">
          <button onclick="onPrint()" title="Print"><i class="fas fa-print"></i></button>
          <button onclick="onDownload()" title="Download"><i class="fas fa-download"></i></button>
          <button id="btn-edit" onclick="openEditor()" title="Edit"><i class="fas fa-pen"></i></button>
          <button onclick="exportPdf()" title="Export PDF" id="btn-export-pdf"><i class="fas fa-file-pdf"></i></button>
          <button class="danger" onclick="onDelete()" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="reader-content" id="reader-content">
        <div class="article" id="article"></div>
      </div>
    </div>
  </div>
</div>

<div class="reading-progress" id="reading-progress"></div>

<!-- Editor Overlay -->
<div class="editor-overlay" id="editor-overlay">
  <div class="editor-toolbar">
    <span class="title" id="editor-title"></span>
    <span class="auto-save" id="auto-save-indicator"></span>
    <button class="md-btn" onclick="mdWrap('**','**')" title="Bold"><b>B</b></button>
    <button class="md-btn" onclick="mdWrap('*','*')" title="Italic"><i>I</i></button>
    <button class="md-btn" onclick="mdWrap('## ','')" title="Heading">H</button>
    <button class="md-btn" onclick="mdWrap('[','](url)')" title="Link">🔗</button>
    <button class="md-btn" onclick="mdWrap('```\n','\n```')" title="Code block">{} </button>
    <button class="md-btn" onclick="mdWrap('- ','')" title="List">⋮</button>
    <input id="editor-tags" placeholder="tags" class="editor-input" style="width:100px">
    <button class="editor-btn-accent" onclick="saveAndClose()"><i class="fas fa-check"></i>&ensp;Save</button>
    <button class="editor-btn-ghost" onclick="closeEditor()"><i class="fas fa-times"></i></button>
  </div>
  <div class="editor-body">
    <textarea id="editor" placeholder="Write markdown here..."></textarea>
    <div class="preview-pane"><div class="article" id="live-preview"></div></div>
  </div>
</div>

<!-- New doc modal -->
<div class="modal" id="new-modal">
  <div class="modal-background" onclick="closeNew()"></div>
  <div class="modal-card">
    <header class="modal-card-head"><p class="modal-card-title is-5"><i class="fas fa-file-lines"></i>&ensp;New document</p></header>
    <section class="modal-card-body">
      <div class="field"><label class="label">Title</label><div class="control"><input class="input" id="new-title" placeholder="Document title..."></div></div>
      <div class="field"><label class="label">Tags</label><div class="control"><input class="input" id="new-tags" placeholder="tag1, tag2"></div></div>
      <div class="field"><label class="label">Template</label><div class="select is-fullwidth"><select id="new-template"><option value="">Blank</option><option value="article">📝 Article</option><option value="report">📊 Report</option><option value="note">📋 Note</option></select></div></div>
      <div class="field"><label class="label">Content (markdown)</label><div class="control"><textarea class="textarea mono-textarea" id="new-content" placeholder="# Title&#10;&#10;Write content here..."></textarea></div></div>
    </section>
    <footer class="modal-card-foot">
      <button class="button" onclick="closeNew()">Cancel</button>
      <button class="button is-link" onclick="createDoc()"><i class="fas fa-check"></i>&ensp;Create</button>
    </footer>
  </div>
</div>

<!-- Drop zone -->
<div class="drop-zone" id="drop-zone" style="display:none">📄 Drop .docx file here</div>

<!-- Confirm modal -->
<div class="modal" id="confirm-modal">
  <div class="modal-background" onclick="closeConfirm()"></div>
  <div class="modal-card">
    <header class="modal-card-head"><p class="modal-card-title is-5">⚠️ Confirm</p></header>
    <section class="modal-card-body"><p id="confirm-msg">Are you sure?</p></section>
    <footer class="modal-card-foot">
      <button class="button" onclick="closeConfirm()">Cancel</button>
      <button class="button is-danger" id="confirm-btn" onclick="">Confirm</button>
    </footer>
  </div>
</div>

<script>
function clearCacheAndSW(){
  if('caches' in window){caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))).then(()=>{toast('🧹 Cache cleared','success')})}
  setTimeout(()=>location.reload(),500);
}
const API='/api/documents';
let docs=[],curId=null,currentExt='md',searchTimer=null,autoSaveTimer=null,searchHistory=JSON.parse(localStorage.getItem('doc-search-hist')||'[]');
const $=id=>document.getElementById(id);

function toast(msg,type,undoCb){
  const c=document.getElementById('toast-container')||(t=>{t.id='toast-container';document.body.appendChild(t);return t})(document.createElement('div'));
  c.className='toast-container';
  const el=document.createElement('div');el.className='toast '+type;el.innerHTML=msg;
  if(undoCb){const u=document.createElement('button');u.className='toast-undo';u.textContent='Undo';u.onclick=()=>{undoCb();el.classList.add('removing');setTimeout(()=>el.remove(),200)};el.appendChild(u)}
  c.appendChild(el);setTimeout(()=>{el.classList.add('removing');setTimeout(()=>el.remove(),200)},4000);
}

// ── Sidebar collapse ──
function toggleSidebar(){
  $('sidebar').classList.toggle('collapsed');
}

// ── Font size ──
function fontSize(delta){
  const r=document.querySelector(':root');
  let cur=parseFloat(getComputedStyle(r).getPropertyValue('--font-size'))||.95;
  cur=Math.max(.7,Math.min(1.5,cur+delta*.05));
  r.style.setProperty('--font-size',cur+'rem');
  toast('Font size: '+Math.round(cur*100)+'%','info');
}

// ── Reading progress ──
$('reader-content').addEventListener('scroll',function(){
  const h=this.scrollHeight-this.clientHeight;
  if(h<=0)return;
  $('reading-progress').style.width=Math.min(100,Math.round(this.scrollTop/h*100))+'%';
});

// ── Search history ──
function addSearchHistory(q){
  if(!q||q.length<2)return;
  searchHistory=searchHistory.filter(s=>s!==q);
  searchHistory.unshift(q);
  if(searchHistory.length>5)searchHistory.pop();
  localStorage.setItem('doc-search-hist',JSON.stringify(searchHistory));
}
function showSearchHistory(){
  const el=$('search-history');
  if(!searchHistory.length||$('search-input').value.trim().length>=2){el.classList.remove('show');return}
  el.innerHTML=searchHistory.map(s=>`<div class="sh-item" onclick="document.getElementById('search-input').value='${esc(s)}';filterList();document.getElementById('search-history').classList.remove('show')">⌕ ${esc(s)}</div>`).join('');
  el.classList.add('show');
}

// ── Full-text search ──
function onSearchInput(){
  const q=$('search-input').value.trim();
  const res=$('search-results');
  $('search-history').classList.remove('show');
  clearTimeout(searchTimer);
  if(!q||q.length<2){res.classList.remove('show');filterList();return}
  searchTimer=setTimeout(async()=>{
    try{
      addSearchHistory(q);
      const r=await fetch(API+'/search?q='+encodeURIComponent(q));
      const data=await r.json();
      if(!data.length){res.innerHTML='<div class="sr-item"><small>No results</small></div>';res.classList.add('show');return}
      res.innerHTML=data.slice(0,10).map(d=>`<div class="sr-item" onclick="loadDoc('${d.id}');document.getElementById('search-results').classList.remove('show')"><strong>${esc(d.id)}</strong><div class="sr-match">${esc(d.match||'')}</div></div>`).join('');
      res.classList.add('show');
    }catch(e){res.classList.remove('show')}
  },300);
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap')){$('search-results').classList.remove('show');$('search-history').classList.remove('show')}});

// ── Drag-and-drop ──
const dz=$('drop-zone');
document.addEventListener('dragenter',e=>{e.preventDefault();dz.style.display='block';dz.classList.add('dragover')});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('dragleave',e=>{if(e.target===document||e.relatedTarget===null){dz.style.display='none';dz.classList.remove('dragover')}});
dz.addEventListener('drop',async e=>{
  e.preventDefault();dz.style.display='none';dz.classList.remove('dragover');
  const f=e.dataTransfer.files[0];if(!f||!f.name.endsWith('.docx')){toast('❌ Only .docx files','error');return}
  const title=f.name.replace(/\.docx$/i,'');
  const reader=new FileReader();
  reader.onload=async function(ev){
    const data=ev.target.result.split(',')[1];
    const r=await fetch(API+'/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,data})});
    const d=await r.json();
    if(d.ok){await loadList();loadDoc(d.id);toast('📤 Uploaded','success')}
  };
  reader.readAsDataURL(f);
});

// ── Export PDF ──
async function exportPdf(){
  if(currentExt!=='md'){toast('❌ Only markdown docs','error');return}
  toast('🔄 Converting...','info');
  try{
    const r=await fetch(API+'/'+curId+'/export-pdf',{method:'POST'});
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=curId+'.pdf';a.click();
    URL.revokeObjectURL(url);
    toast('📄 PDF downloaded','success');
  }catch(e){toast('❌ Export failed','error')}
}

// ── Sorting ──
function getSortFn(){
  const v=$('sort-select').value;
  if(v==='newest')return(a,b)=>new Date(b.created)-new Date(a.created);
  if(v==='oldest')return(a,b)=>new Date(a.created)-new Date(b.created);
  if(v==='name-asc')return(a,b)=>a.title.localeCompare(b.title);
  if(v==='name-desc')return(a,b)=>b.title.localeCompare(a.title);
}

// ── List ──
async function loadList(){
  try{
    const r=await fetch(API);docs=await r.json();renderList();renderTagFilter();
    $('doc-count').textContent=docs.length;
    $('btn-export-pdf').style.display=currentExt==='md'?'':'none';
    if(curId&&docs.find(d=>d.id===curId))loadDoc(curId);
    else{$('empty-state').style.display='flex';$('doc-view').style.display='none'}
  }catch(e){$('doc-list').innerHTML='<li class="doc-item" style="cursor:default;color:var(--red)">Error loading</li>';toast('❌ Load failed','error')}
}

let activeTag=null;
function renderTagFilter(){
  const el=$('tag-filter');
  const tags=[...new Set(docs.flatMap(d=>(d.tags||'').split(',').map(t=>t.trim()).filter(Boolean)))].sort();
  el.innerHTML='<button class="tag-chip'+(activeTag===null?' active':'')+'" onclick="setTag(null)">All</button>'+
    tags.map(t=>`<button class="tag-chip${activeTag===t?' active':''}" onclick="setTag('${esc(t)}')">${esc(t)}</button>`).join('');
}
function setTag(t){activeTag=t;renderList()}

function renderList(){
  const ul=$('doc-list');
  let f=docs.slice().sort(getSortFn());
  // Filter: search
  const q=$('search-input').value.toLowerCase();
  if(q)f=f.filter(d=>d.title.toLowerCase().includes(q)||(d.tags||'').toLowerCase().includes(q));
  // Filter: tag
  if(activeTag)f=f.filter(d=>(d.tags||'').split(',').map(t=>t.trim()).includes(activeTag));
  // Filter: status
  if($('status-filter').checked)f=f.filter(d=>d.status==='draft');
  $('doc-count-detail').textContent=f.length<docs.length?`(${f.length} shown)`: '';
  if(!f.length){ul.innerHTML=`<li class="doc-item" style="cursor:default;text-align:center;color:var(--text-dim);padding:1rem"><small>${q?'No matches':'No documents'}</small></li>`;return}
  ul.innerHTML=f.map(d=>`<li class="doc-item${d.id===curId?' active':''}" onclick="loadDoc('${d.id}')">
    <input type="checkbox" class="d-cb${selectedCb.size?' show':''}" onclick="event.stopPropagation();toggleCb('${d.id}')">
    <div class="d-body">
      <div class="d-title">${esc(d.title)}${d.ext==='docx'?' <span class="d-badge">DOCX</span>':''}</div>
      <div class="d-meta"><span>${d.created?d.created.slice(0,10):''}${d.tags?' · '+esc(d.tags):''}${d.status==='draft'?' · ✏️':''}</span></div>
    </div>
  </li>`).join('');
}

// ── Rename (inline) ──
function renameStart(){
  if(currentExt!=='md')return;
  const t=$('doc-title').textContent;
  $('doc-title').style.display='none';
  $('doc-title-input').style.display='';
  $('doc-title-input').value=t;
  $('doc-title-input').focus();
  $('doc-title-input').select();
}
async function renameSave(){
  const v=$('doc-title-input').value.trim();
  if(!v||v===$('doc-title').textContent){renameCancel();return}
  $('doc-title-input').style.display='none';
  const r=await fetch(API+'/'+curId+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:v})});
  const d=await r.json();
  if(d.ok){
    if(d.id!==curId)curId=d.id;
    await loadList();loadDoc(curId);toast('✏️ Renamed','success');
  }else{toast('❌ Rename failed','error');$('doc-title').style.display=''}
}
function renameCancel(){$('doc-title-input').style.display='none';$('doc-title').style.display=''}

// ── Bulk delete ──
const selectedCb=new Set();
function toggleCb(id){
  if(selectedCb.has(id))selectedCb.delete(id);else selectedCb.add(id);
  $('bulk-del-btn').classList.toggle('show',selectedCb.size>0);
}
async function bulkDelete(){
  if(!selectedCb.size||!confirm('Delete '+selectedCb.size+' docs?'))return;
  for(const id of selectedCb){
    try{await fetch(API+'/'+id,{method:'DELETE'})}catch(_){}
  }
  selectedCb.clear();$('bulk-del-btn').classList.remove('show');loadList();toast('🗑 Deleted','info');
}

function filterList(){renderList()}

// ── Load doc ──
async function loadDoc(id){
  if(closeEditor())return;
  $('toc-drop').classList.remove('show');
  try{
    const r=await fetch(API+'/'+id);const d=await r.json();
    if(d.error)return;curId=id;currentExt=d.ext||'md';setHash(id);
    $('empty-state').style.display='none';$('doc-view').style.display='flex';
    const m=docs.find(x=>x.id===id);
    $('doc-title').textContent=m?m.title:id;
    $('doc-title').style.display='';
    $('doc-title-input').style.display='none';
    $('doc-meta').textContent=m?'📅 '+(m.created?m.created.slice(0,10):'')+(m.tags?' · 🏷 '+m.tags:'')+(m.status==='draft'?' · ✏️ Draft':''):'';
    $('btn-edit').style.display=currentExt==='md'?'':'none';
    $('btn-export-pdf').style.display=currentExt==='md'?'':'none';
    if(currentExt==='docx'){
      $('reader-content').innerHTML=`<div class="pdf-wrap"><div class="pdf-bar"><span class="spinner"></span> Converting to PDF... <span id="pdf-status"></span></div><embed id="pdf-embed" src="/api/documents/${curId}/pdf" type="application/pdf" style="flex:1;border:none;background:var(--page)"></div>`;
      $('pdf-embed').addEventListener('load',()=>{const bar=document.querySelector('.pdf-bar');if(bar)bar.innerHTML='<span>📄 PDF ready</span>'});
    } else {
      $('reader-content').innerHTML=`<div class="article" id="article"></div>`;
      renderArticle(d.content||'');
    }
    renderList();
    if(window.innerWidth<=720){$('sidebar').classList.add('hide');$('reader').classList.add('show');$('back-btn').style.display=''}
    setTimeout(()=>{$('reading-progress').style.width='0'},50);
  }catch(e){toast('❌ Load failed','error')}
}
function showList(){$('sidebar').classList.remove('hide');$('reader').classList.remove('show');$('back-btn').style.display='none'}
function renderArticle(md){
  try{
    const html=marked.parse(md);
    const q=$('search-input').value.trim();
    const art=$('article');
    art.innerHTML=q?html.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'):html;
    art.querySelectorAll('a').forEach(a=>{if(a.href)a.target='_blank'});
    // Word count
    const words=md.trim()?md.split(/\s+/).length:0;
    const chars=md.length;
    const wc=document.createElement('div');wc.className='word-count';wc.textContent='📝 '+words.toLocaleString()+' từ · '+chars.toLocaleString()+' ký tự';
    art.appendChild(wc);
    // Build TOC
    buildToc(html);
  }catch(e){$('article').textContent=md}
}
function buildToc(html){
  const el=$('toc-drop');
  const tmp=document.createElement('div');tmp.innerHTML=html;
  const links=[];
  tmp.querySelectorAll('h1,h2,h3').forEach(h=>{
    const level=h.tagName.slice(1);
    const id='toc-'+(links.length+1);
    h.id=id;
    links.push({level,text:h.textContent,id});
  });
  if(!links.length){el.innerHTML='';return}
  el.innerHTML=links.map(l=>`<a class="toc-h${l.level}" href="#${l.id}" onclick="document.getElementById('toc-drop').classList.remove('show')">${esc(l.text)}</a>`).join('');
}
function toggleToc(){$('toc-drop').classList.toggle('show')}
document.addEventListener('click',e=>{if(!e.target.closest('.toc-btn'))$('toc-drop').classList.remove('show')});

function onPrint(){window.print()}
function onDownload(){const m=docs.find(x=>x.id===curId);if(m)window.open(API+'/'+curId+'?dl=1','_blank')}

// ── Editor ──
function openEditor(){
  if(currentExt!=='md')return;
  $('editor-overlay').classList.add('show');
  $('editor-title').textContent=$('doc-title').textContent;
  $('editor-tags').value=docs.find(x=>x.id===curId)?.tags||'';
  fetch(API+'/'+curId).then(r=>r.json()).then(d=>{$('editor').value=d.content||'';updatePreview();$('editor').focus()});
}
function closeEditor(){$('editor-overlay').classList.remove('show');$('auto-save-indicator').textContent='';clearTimeout(autoSaveTimer);return false}
async function saveAndClose(){
  const c=$('editor').value,t=$('editor-tags').value;
  await fetch(API+'/'+curId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,tags:t})});
  const m=docs.find(x=>x.id===curId);if(m)m.tags=t;
  $('reader-content').innerHTML=`<div class="article" id="article"></div>`;
  renderArticle(c);
  $('doc-meta').textContent=m?'📅 '+(m.created?m.created.slice(0,10):'')+(t?' · 🏷 '+t:''):'';
  closeEditor();loadList();toast('💾 Saved','success');
}
function updatePreview(){try{$('live-preview').innerHTML=marked.parse($('editor').value||'')}catch(e){}}

// ── Auto-save (debounce 3s) ──
$('editor').addEventListener('input',function(){
  clearTimeout(autoSaveTimer);
  $('auto-save-indicator').textContent='Unsaved changes…';
  $('auto-save-indicator').className='auto-save saving';
  autoSaveTimer=setTimeout(async()=>{
    if(!$('editor-overlay').classList.contains('show'))return;
    const c=$('editor').value,t=$('editor-tags').value;
    await fetch(API+'/'+curId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,tags:t})});
    const m=docs.find(x=>x.id===curId);if(m)m.tags=t;
    $('auto-save-indicator').textContent='✓ Auto-saved';
    $('auto-save-indicator').className='auto-save saved';
    setTimeout(()=>{$('auto-save-indicator').textContent=''},2000);
  },3000);
});

// ── Markdown toolbar ──
function mdWrap(before,after){
  const ta=$('editor');
  const start=ta.selectionStart,end=ta.selectionEnd;
  const sel=ta.value.slice(start,end)||'text';
  ta.value=ta.value.slice(0,start)+before+sel+after+ta.value.slice(end);
  const newPos=start+before.length+sel.length+after.length;
  ta.setSelectionRange(newPos,newPos);ta.focus();
  updatePreview();
}

// ── URL hash ──
function setHash(id){history.replaceState(null,'','#'+encodeURIComponent(id))}
function clearHash(){history.replaceState(null,'',' ')}
window.addEventListener('hashchange',()=>{const h=location.hash.slice(1);if(h&&h!==curId&&docs.find(d=>d.id===h))loadDoc(h)});
(function(){const h=location.hash.slice(1);if(h){setTimeout(async()=>{await loadList();if(docs.find(d=>d.id===h))loadDoc(h)},100)}})();

// ── Delete ──
async function onDelete(){
  showConfirm('🗑 Delete <strong>'+esc(curId)+'</strong>?',async()=>{
    await fetch(API+'/'+curId,{method:'DELETE'});
    curId=null;clearHash();$('doc-view').style.display='none';$('empty-state').style.display='flex';
    closeEditor();loadList();toast('🗑 Deleted','info');
  });
}

// ── Create ──
const TEMPLATES={article:'# Title\n\n## Introduction\n\nWrite introduction here.\n\n## Main Content\n\nWrite your content here.\n\n## Conclusion\n\nSummarize key points.',report:'# Report: [Title]\n\n**Date:** \n**Author:** \n\n## Executive Summary\n\nBrief overview.\n\n## Findings\n\n1. Finding one\n2. Finding two\n3. Finding three\n\n## Recommendations\n\n- Action item 1\n- Action item 2',note:'# [Title]\n\n- Key point 1\n- Key point 2\n- Key point 3\n\n## Action Items\n\n- [ ] Task 1\n- [ ] Task 2'};
function openNew(){$('new-modal').classList.add('is-active');$('new-title').value='';$('new-tags').value='';$('new-content').value='';$('new-template').value='';setTimeout(()=>$('new-title').focus(),100)}
$('new-template').addEventListener('change',()=>{const v=$('new-template').value;if(v&&TEMPLATES[v])$('new-content').value=TEMPLATES[v]});
function closeNew(){$('new-modal').classList.remove('is-active')}
async function createDoc(){
  const t=$('new-title').value.trim();if(!t)return;
  $('new-modal').classList.remove('is-active');
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,tags:$('new-tags').value.trim(),content:$('new-content').value})});
  const d=await r.json();
  if(d.ok){await loadList();loadDoc(d.id);toast('📄 Created','success')}
}

// ── Upload ──
function openUpload(){$('upload-input').click()}
async function uploadFile(input){
  const f=input.files[0];if(!f)return;
  const title=prompt('File name:',f.name.replace(/\.docx$/i,''));
  if(!title){input.value='';return}
  const reader=new FileReader();
  reader.onload=async function(e){
    const data=e.target.result.split(',')[1];
    const r=await fetch(API+'/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,data})});
    const d=await r.json();
    if(d.ok){await loadList();loadDoc(d.id);toast('📤 Uploaded','success')}
    input.value='';
  };
  reader.readAsDataURL(f);
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeNew();if($('editor-overlay').classList.contains('show'))closeEditor();$('toc-drop').classList.remove('show')}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if($('editor-overlay').classList.contains('show'))saveAndClose()}
});

// ── Confirm modal ──
function showConfirm(msg,onConfirm){
  $('confirm-msg').innerHTML=msg;$('confirm-btn').onclick=()=>{closeConfirm();if(onConfirm)onConfirm()};
  $('confirm-modal').classList.add('is-active');
}
function closeConfirm(){$('confirm-modal').classList.remove('is-active')}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadList();
</script>
